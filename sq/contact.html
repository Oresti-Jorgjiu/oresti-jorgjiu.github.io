<!doctype html><html lang="sq-AL"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kontakt • Oresti Jorgjiu</title><meta name="description" content="Kontaktet dhe lidhjet sociale.">
<link rel="stylesheet" href="../styles.css"><script defer src="../script.js"></script>
</head><body data-page="contact">
<a class="skip-link" href="#main">Kalo te përmbajtja</a>
<div class="fx" aria-hidden="true"><canvas id="particles"></canvas></div>
<header data-site-header></header><aside class="social-rail" data-social-rail aria-label="Lidhje sociale"></aside>

<main id="main" class="site-main container">
  <header class="page-head" data-reveal>
    <h1 class="h1 aberrate">Kontakt</h1>
    <p class="sub">Kthej pergjigje me shpejt ne : email ose LinkedIn.</p>
  </header>

  <section class="section grid two" data-reveal>
    <article class="card glass" data-hotspot>
      <h2 class="h2">Direkt</h2>
      <p><a class="link" href="mailto:jorgjiu.oresti@gmail.com">jorgjiu.oresti@gmail.com</a></p>
      <div class="row">
        <a class="btn small" data-link="linkedin" href="#" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
        <a class="btn small ghost" data-link="credly" href="#" target="_blank" rel="noopener noreferrer">Credly ↗</a>
      </div>
    </article>

    <form class="card glass form" data-hotspot id="contact-form">
      <h2 class="h2">Mesazh</h2>
      <label><span>Emri</span><input name="name" autocomplete="name" required></label>
      <label><span>Email</span><input name="email" type="email" autocomplete="email" required></label>
      <label><span>Mesazh</span><textarea name="message" rows="5" required></textarea></label>
      <button class="btn primary" type="submit">Dërgo </button>
      <p class="mono">Ju lutem përdorni emailin tuaj të vërtetë që t’ju përgjigjem.</p>
    </form>
  </section>
</main>

<footer data-site-footer></footer>
<button class="to-top" type="button" aria-label="Back to top" hidden>▲</button>
</body></html>
